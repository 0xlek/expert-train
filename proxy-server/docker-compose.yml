services:
  proxy-server:
    build: .
    container_name: proxy-server
    environment:
      - PROXY_PASSPHRASE=change-me
      - PORT=8080
      - API_PORT=8081
      - PROXY_SERVERS=
      - TLS_CERT=/certs/cert.pem
      - TLS_KEY=/certs/key.pem
    volumes:
      - ./certs:/certs:ro
    ports:
      - "8080:8080"
      - "8081:8081"
    restart: unless-stopped
    logging:
      options:
        max-size: 10m
